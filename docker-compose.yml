services:

  postgres:
    image: postgres:17
    container_name: hotel-postgres
    restart: always
    environment:
      POSTGRES_USER: hoteladmin
      POSTGRES_PASSWORD: hotelpassword
      POSTGRES_DB: hotelbooking
    ports:
      - "5432:5432"
    volumes:
      - hotel_data:/var/lib/postgresql/data


volumes:
  hotel_data:
