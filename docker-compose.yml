services:


 postgres:

  image: postgres:16

  container_name: hotel-postgres

  environment:

   POSTGRES_DB: hotelbooking

   POSTGRES_USER: hoteladmin

   POSTGRES_PASSWORD: password

  ports:

   - "5432:5432"

  volumes:

   - postgres_data:/var/lib/postgresql/data



 redis:

  image: redis:7

  container_name: hotel-redis

  ports:

   - "6379:6379"



 backend:

  build:

   context: ./Hotel.Api

  container_name: hotel-api

  ports:

   - "8080:8080"

  depends_on:

   - postgres

   - redis



 frontend:

  build:

   context: ./frontend

  container_name: hotel-frontend

  ports:

   - "3000:80"

  depends_on:

   - backend



volumes:

 postgres_data:
